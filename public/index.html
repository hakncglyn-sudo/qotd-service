<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quote of the Day</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400..700;1,6..72,400..700&family=Work+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #fdf8f8;
        --surface: #f7f3f2;
        --surface-high: #ebe7e6;
        --text: #1c1b1b;
        --text-muted: #444748;
        --text-faint: #747878;
        --accent: #755a2b;
        --accent-bg: #fdd79d;
        --accent-text: #5b4216;
        --border: #c4c7c7;
        --border-soft: #e5e2e1;
        --error: #ba1a1a;
        --error-bg: #ffdad6;
        --error-text: #93000a;
        --font-serif: 'Newsreader', Georgia, 'Times New Roman', serif;
        --font-sans: 'Work Sans', system-ui, -apple-system, sans-serif;
        --max-w: 800px;
        --radius: 16px;
        --radius-pill: 9999px;
        --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.04);
        --shadow-lift: 0 8px 24px rgba(0, 0, 0, 0.06);
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0e1116;
          --surface: #161a20;
          --surface-high: #20252c;
          --text: #e8e2d4;
          --text-muted: #b8b0a4;
          --text-faint: #8c857a;
          --accent: #c9a569;
          --accent-bg: #3a2c12;
          --accent-text: #fdd79d;
          --border: #2c323a;
          --border-soft: #20252c;
          --error: #ffb4ab;
          --error-bg: #4a0006;
          --error-text: #ffdad6;
          --shadow-soft: 0 1px 2px rgba(0, 0, 0, 0.3);
          --shadow-lift: 0 8px 24px rgba(0, 0, 0, 0.4);
        }
      }

      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-serif);
        font-size: 18px;
        line-height: 1.6;
        min-height: 100dvh;
      }

      .topbar {
        background: var(--bg);
        border-bottom: 1px solid var(--border-soft);
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .topbar-inner {
        max-width: var(--max-w);
        margin: 0 auto;
        padding: 1.25rem 1.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }
      .wordmark {
        font-family: var(--font-serif);
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: -0.01em;
        margin: 0;
      }
      .counter-pill {
        font-family: var(--font-sans);
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        background: var(--accent-bg);
        color: var(--accent-text);
        padding: 0.35rem 0.85rem;
        border-radius: var(--radius-pill);
      }

      main {
        max-width: var(--max-w);
        margin: 0 auto;
        padding: 3rem 1.5rem 6rem;
      }

      #error {
        margin-bottom: 2rem;
        padding: 0.85rem 1rem;
        background: var(--error-bg);
        color: var(--error-text);
        border: 1px solid color-mix(in srgb, var(--error) 30%, transparent);
        border-radius: 10px;
        font-family: var(--font-sans);
        font-size: 0.92rem;
        display: none;
      }
      #error.visible {
        display: block;
      }

      .hero {
        position: relative;
        background: var(--surface);
        border: 1px solid var(--border-soft);
        border-radius: var(--radius);
        padding: 3rem 2.5rem;
        margin-bottom: 3rem;
        overflow: hidden;
        transition: box-shadow 200ms ease;
      }
      .hero:hover {
        box-shadow: var(--shadow-lift);
      }
      .hero::before {
        content: '\201C';
        position: absolute;
        top: 0.5rem;
        left: 1rem;
        font-family: var(--font-serif);
        font-size: 10rem;
        line-height: 1;
        color: var(--accent);
        opacity: 0.1;
        user-select: none;
        pointer-events: none;
      }
      .hero-quote {
        position: relative;
        font-style: italic;
        font-size: clamp(1.4rem, 2.4vw, 2rem);
        line-height: 1.3;
        letter-spacing: -0.01em;
        margin: 0 0 2rem;
        font-weight: 400;
      }
      .hero-attribution {
        position: relative;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 1.25rem;
      }
      .hero-author {
        font-family: var(--font-sans);
        font-size: 0.78rem;
        font-weight: 600;
        font-style: normal;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
      }

      button {
        font: inherit;
        cursor: pointer;
        border: none;
        background: none;
        color: inherit;
      }
      .btn {
        font-family: var(--font-sans);
        font-size: 0.88rem;
        font-weight: 500;
        letter-spacing: 0.01em;
        padding: 0.7rem 1.25rem;
        border-radius: var(--radius-pill);
        transition:
          transform 150ms ease,
          background 150ms ease,
          color 150ms ease,
          border-color 150ms ease;
      }
      .btn-primary {
        border: 1px solid var(--accent);
        color: var(--accent);
        background: transparent;
      }
      .btn-primary:hover {
        background: var(--accent);
        color: var(--bg);
      }
      .btn-primary:active {
        transform: scale(0.97);
      }
      .btn-secondary {
        border: 1px solid var(--border);
        color: var(--text-muted);
        background: var(--surface);
        border-radius: 10px;
      }
      .btn-secondary:hover {
        background: var(--surface-high);
        color: var(--text);
      }

      .toolbar {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 2rem;
        flex-wrap: wrap;
      }
      .toolbar > input {
        flex: 1 1 240px;
        min-width: 0;
        font: inherit;
        font-family: var(--font-sans);
        font-size: 0.92rem;
        padding: 0.7rem 1rem;
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border-soft);
        border-radius: 10px;
        outline: none;
        transition: border-color 150ms ease;
      }
      .toolbar > input::placeholder {
        color: var(--text-faint);
      }
      .toolbar > input:focus {
        border-color: var(--accent);
      }

      .section-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 1rem;
        padding-bottom: 0.85rem;
        margin-bottom: 0.5rem;
        border-bottom: 1px solid var(--border-soft);
      }
      .section-head h2 {
        font-family: var(--font-serif);
        font-size: 1.15rem;
        font-weight: 600;
        margin: 0;
        letter-spacing: -0.005em;
      }
      .section-head .meta {
        font-family: var(--font-sans);
        font-size: 0.78rem;
        color: var(--text-faint);
        letter-spacing: 0.05em;
      }

      .quote-card {
        padding: 1.5rem 0.25rem;
        border-bottom: 1px solid var(--border-soft);
        transition: background 200ms ease;
      }
      .quote-card:last-child {
        border-bottom: none;
      }
      .quote-card p {
        font-size: 1.08rem;
        line-height: 1.6;
        margin: 0 0 1rem;
      }
      .quote-card .row {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        flex-wrap: wrap;
      }
      .author-chip {
        font-family: var(--font-sans);
        font-size: 0.78rem;
        font-weight: 500;
        letter-spacing: 0.02em;
        padding: 0.35rem 0.9rem;
        border-radius: var(--radius-pill);
        border: 1px solid var(--border);
        color: var(--text-muted);
        background: transparent;
        cursor: pointer;
        transition:
          transform 150ms ease,
          background 150ms ease,
          border-color 150ms ease,
          color 150ms ease;
      }
      .author-chip:hover {
        background: var(--accent-bg);
        border-color: var(--accent-bg);
        color: var(--accent-text);
        transform: translateY(-1px);
      }
      .author-chip:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .empty {
        font-family: var(--font-sans);
        color: var(--text-faint);
        padding: 2rem 0;
        font-size: 0.95rem;
      }
      .empty button.linkish {
        color: var(--accent);
        text-decoration: underline;
        padding: 0;
        background: none;
        border: none;
        font: inherit;
        cursor: pointer;
      }

      .skeleton {
        color: var(--text-faint);
        font-style: italic;
        opacity: 0.6;
      }

      footer {
        max-width: var(--max-w);
        margin: 4rem auto 2rem;
        padding: 2rem 1.5rem;
        border-top: 1px solid var(--border-soft);
        font-family: var(--font-sans);
        font-size: 0.72rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-faint);
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <h1 class="wordmark">Quote of the Day</h1>
        <span id="counter" class="counter-pill" aria-live="polite">… quotes</span>
      </div>
    </header>

    <main>
      <p id="error" role="alert"></p>

      <section id="hero" class="hero" aria-label="Featured quote">
        <blockquote class="hero-quote skeleton">Loading the quote of the day…</blockquote>
        <div class="hero-attribution">
          <cite class="hero-author">—</cite>
          <button
            id="hero-refresh"
            class="btn btn-primary"
            type="button"
            aria-label="Show another random quote"
          >
            New random
          </button>
        </div>
      </section>

      <section class="toolbar" aria-label="Filter and refresh controls">
        <input
          id="filter-input"
          type="search"
          list="authors-list"
          placeholder="Search by author…"
          aria-label="Search quotes by author"
          autocomplete="off"
        />
        <datalist id="authors-list"></datalist>
        <button
          id="filter-btn"
          class="btn btn-secondary"
          type="button"
          aria-label="Apply author filter"
        >
          Filter
        </button>
        <button
          id="clear-btn"
          class="btn btn-secondary"
          type="button"
          aria-label="Clear filter and reload all"
        >
          Clear
        </button>
        <button
          id="refresh-btn"
          class="btn btn-secondary"
          type="button"
          aria-label="Reload all quotes"
        >
          Refresh
        </button>
      </section>

      <div id="list-head" class="section-head">
        <h2 id="list-title">All quotes</h2>
        <span id="list-meta" class="meta"></span>
      </div>
      <div id="list"></div>
    </main>

    <footer>Curated for the thoughtful reader · qotd-service</footer>

    <script type="module">
      const $ = (id) => document.getElementById(id);
      const heroEl = $('hero');
      const listEl = $('list');
      const errorEl = $('error');
      const counterEl = $('counter');
      const filterInput = $('filter-input');
      const datalistEl = $('authors-list');
      const listTitleEl = $('list-title');
      const listMetaEl = $('list-meta');

      const escape = (s) =>
        String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');

      const setError = (msg) => {
        if (msg) {
          errorEl.textContent = msg;
          errorEl.classList.add('visible');
        } else {
          errorEl.textContent = '';
          errorEl.classList.remove('visible');
        }
      };

      const fetchJson = async (url, opts) => {
        const res = await fetch(url, opts);
        const body = await res.json().catch(() => ({}));
        if (!res.ok) {
          const err = body?.error?.message ?? `HTTP ${res.status}`;
          const e = new Error(err);
          e.status = res.status;
          throw e;
        }
        return body;
      };

      const quoteCard = (q) =>
        `<article class="quote-card">
          <p>${escape(q.text)}</p>
          <div class="row">
            <button class="author-chip" type="button" data-author="${escape(q.author)}" aria-label="Show details for ${escape(q.author)}">${escape(q.author)}</button>
          </div>
        </article>`;

      const renderList = (quotes) => {
        if (!quotes.length) {
          listEl.innerHTML =
            '<p class="empty">No quotes match. <button type="button" class="linkish" id="show-all">Show all quotes</button></p>';
          return;
        }
        listEl.innerHTML = quotes.map(quoteCard).join('');
      };

      const renderHero = (q) => {
        const quoteEl = heroEl.querySelector('.hero-quote');
        const authorEl = heroEl.querySelector('.hero-author');
        if (!q) {
          quoteEl.classList.remove('skeleton');
          quoteEl.textContent = 'No quotes yet — add one to get started.';
          authorEl.textContent = '—';
          return;
        }
        quoteEl.classList.remove('skeleton');
        quoteEl.textContent = q.text;
        authorEl.textContent = q.author;
      };

      const setListHeader = (title, meta) => {
        listTitleEl.textContent = title;
        listMetaEl.textContent = meta ?? '';
      };

      const showRandom = async () => {
        setError('');
        try {
          const { data } = await fetchJson('/api/quotes/random');
          renderHero(data);
        } catch (e) {
          if (e.status === 404) {
            renderHero(null);
            return;
          }
          setError(`Could not load random quote: ${e.message}`);
        }
      };

      const loadList = async (author) => {
        setError('');
        try {
          const url = author ? `/api/quotes?author=${encodeURIComponent(author)}` : '/api/quotes';
          const { data } = await fetchJson(url);
          renderList(data ?? []);
          if (author) {
            setListHeader(`Filtered: ${author}`, `${(data ?? []).length} match`);
          } else {
            setListHeader('All quotes', '');
          }
        } catch (e) {
          setError(`Could not load quotes: ${e.message}`);
        }
      };

      const loadCount = async () => {
        try {
          const { data } = await fetchJson('/api/quotes/count');
          const n = Number(data?.count ?? 0);
          counterEl.textContent = `${n} quote${n === 1 ? '' : 's'}`;
        } catch {
          counterEl.textContent = '— quotes';
        }
      };

      const loadAuthorsDatalist = async () => {
        try {
          const { data } = await fetchJson('/api/authors');
          datalistEl.innerHTML = (data ?? [])
            .map((a) => `<option value="${escape(a.author)}"></option>`)
            .join('');
        } catch {
          /* enhancement only — silent */
        }
      };

      const showAuthorDetail = async (authorArg) => {
        const author = (authorArg ?? filterInput.value).trim();
        if (!author) {
          setError('Type an author name first.');
          return;
        }
        filterInput.value = author;
        setError('');
        try {
          const { data } = await fetchJson(`/api/quotes/by-author/${encodeURIComponent(author)}`);
          setListHeader(
            `Author: ${data.author}`,
            `${data.count} quote${data.count === 1 ? '' : 's'}`,
          );
          renderList(data.quotes ?? []);
        } catch (e) {
          if (e.status === 404) {
            setListHeader('All quotes', '');
            listEl.innerHTML = '';
            setError('No quotes found for that author.');
            return;
          }
          setError(`Could not load author detail: ${e.message}`);
        }
      };

      const onChipClick = (ev) => {
        const chip = ev.target.closest('.author-chip');
        if (!chip) return;
        const author = chip.dataset.author;
        if (author) showAuthorDetail(author);
      };
      listEl.addEventListener('click', onChipClick);

      listEl.addEventListener('click', (ev) => {
        if (ev.target?.id === 'show-all') {
          filterInput.value = '';
          loadList();
        }
      });

      $('hero-refresh').addEventListener('click', showRandom);
      $('filter-btn').addEventListener('click', () => loadList(filterInput.value.trim()));
      $('clear-btn').addEventListener('click', () => {
        filterInput.value = '';
        loadList();
      });
      $('refresh-btn').addEventListener('click', () => {
        filterInput.value = '';
        loadList();
        loadCount();
      });
      filterInput.addEventListener('keydown', (ev) => {
        if (ev.key === 'Enter') loadList(filterInput.value.trim());
      });

      showRandom();
      loadList();
      loadCount();
      loadAuthorsDatalist();
    </script>
  </body>
</html>
